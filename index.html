<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon AI Face Scanner</title>
    <!-- Google Fonts for Cartoon Look -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Face API (The Brain of our Scanner) -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        /* Cartoon Style 2026 (Neobrutalism) */
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #ffde59;
            background-image: radial-gradient(#ffbd00 20%, transparent 20%), radial-gradient(#ffbd00 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .cartoon-card {
            background-color: white;
            border: 6px solid black;
            border-radius: 30px;
            box-shadow: 10px 10px 0px black;
            padding: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 350px;
            border: 5px solid black;
            border-radius: 20px;
            overflow: hidden;
            background-color: #ffe4e1;
            box-shadow: inset 0px 0px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        /* Scanning Animation */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #00ffcc;
            box-shadow: 0px 0px 15px 5px rgba(0, 255, 204, 0.7);
            display: none;
            z-index: 10;
        }

        .scanning .scan-line {
            display: block;
            animation: scanAnim 1.5s linear infinite alternate;
        }

        @keyframes scanAnim {
            0% { top: 0%; }
            100% { top: 98%; }
        }

        /* Cartoon Button */
        .cartoon-btn {
            background-color: #ff5757;
            color: white;
            border: 4px solid black;
            border-radius: 15px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 5px 5px 0px black;
            transition: all 0.1s ease-in-out;
            width: 100%;
            text-transform: uppercase;
        }

        .cartoon-btn:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px black;
        }

        .cartoon-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: 5px 5px 0px black;
        }

        /* Result Box */
        .result-box {
            display: none;
            background-color: #cb6ce6;
            color: white;
            border: 4px solid black;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            box-shadow: 5px 5px 0px black;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Loading Overlay */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            z-index: 50;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            padding: 20px;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 6px solid #ffde59;
            border-top: 6px solid #ff5757;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Error Text Style */
        .error-text {
            color: #d32f2f;
            font-size: 1rem;
            margin-top: 10px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="cartoon-card">
        <!-- Loading Screen -->
        <div id="loading-overlay">
            <div class="spinner" id="spinner"></div>
            <p id="loading-text">AI दिमाग लोड हो रहा है... 🧠⏳<br><span class="text-sm text-gray-500">बस थोडा सा इंतज़ार...</span></p>
            <p id="error-details" class="error-text" style="display: none;"></p>
        </div>

        <h1 class="text-3xl font-bold mb-4 text-black tracking-wide" style="text-shadow: 2px 2px 0px white;">🤖 AI Scanner</h1>
        
        <div class="video-container" id="vid-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="scan-line"></div>
        </div>

        <button id="scan-btn" class="cartoon-btn" disabled>📸 फोटो खींचो</button>

        <div id="result" class="result-box">
            <!-- Results will show here -->
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const scanBtn = document.getElementById('scan-btn');
        const resultBox = document.getElementById('result');
        const loadingOverlay = document.getElementById('loading-overlay');
        const vidContainer = document.getElementById('vid-container');
        const loadingText = document.getElementById('loading-text');
        const spinner = document.getElementById('spinner');
        const errorDetails = document.getElementById('error-details');

        // Step 1: Load AI Models (New Reliable Links)
        async function loadModels() {
            try {
                // Using raw.githubusercontent which is more reliable for direct file access
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
                
                loadingText.innerHTML = "दिमाग की बत्ती जला रहे हैं... 💡";

                // Loading models one by one to prevent timeouts
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                loadingText.innerHTML = "उम्र पहचानने की मशीन चालू... ⚙️";
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);

                loadingText.innerHTML = "कैमरा चालू हो रहा है... 🎥";
                startVideo();
            } catch (error) {
                console.error("Model Load Error:", error);
                spinner.style.display = 'none';
                loadingText.innerHTML = "❌ ओहो! कुछ गड़बड़ हो गई!";
                errorDetails.style.display = 'block';
                errorDetails.innerHTML = "चेहरा पहचानने वाली फाइलें डाउनलोड नहीं हो पाईं।<br>कृपया पेज को रिफ्रेश करें।";
            }
        }

        // Step 2: Start Camera
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } // Front camera
            })
            .then(stream => {
                video.srcObject = stream;
                // Wait for video to start playing
                video.addEventListener('play', () => {
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                        scanBtn.disabled = false;
                    }, 500); // Small delay for smooth transition
                });
            })
            .catch(err => {
                console.error("Camera Error:", err);
                spinner.style.display = 'none';
                loadingText.innerHTML = "❌ कैमरा चालू नहीं हो पाया!";
                errorDetails.style.display = 'block';
                errorDetails.innerHTML = "शायद आपने कैमरे की परमिशन नहीं दी है।<br>ब्राउज़र की सेटिंग में जाकर 'Allow' करें।";
            });
        }

        // Wait for face-api.js to load before calling loadModels
        window.addEventListener('load', () => {
            // Check if faceapi is defined (the script loaded successfully)
            if (typeof faceapi !== 'undefined') {
                loadModels();
            } else {
                spinner.style.display = 'none';
                loadingText.innerHTML = "❌ मुख्य फाइल लोड नहीं हुई!";
                errorDetails.style.display = 'block';
                errorDetails.innerHTML = "कृपया अपना इंटरनेट कनेक्शन चेक करें और रिफ्रेश करें।";
            }
        });

        // Step 3: Scan on Button Click
        scanBtn.addEventListener('click', async () => {
            // Reset UI
            resultBox.style.display = 'none';
            vidContainer.classList.add('scanning');
            scanBtn.innerText = "⏳ स्कैनिंग चल रही है...";
            scanBtn.disabled = true;

            // Give it 1.5 seconds for the cool animation
            setTimeout(async () => {
                try {
                    // Detect Face, Age, and Gender
                    const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 });
                    const detections = await faceapi.detectSingleFace(video, options).withAgeAndGender();
                    
                    vidContainer.classList.remove('scanning');
                    scanBtn.innerText = "📸 फिर से खींचो";
                    scanBtn.disabled = false;

                    if (detections) {
                        // Success! Show Results
                        const age = Math.round(detections.age);
                        // Translate to Hindi
                        const gender = detections.gender === 'male' ? 'लड़का 👦' : 'लड़की 👧';
                        
                        resultBox.innerHTML = `
                            <div class="text-xl mb-2">✨ चेहरा मिल गया! ✨</div>
                            <div class="bg-white text-black rounded-lg p-2 mb-2 border-2 border-black">
                                <b>उम्र (लगभग):</b> ${age} साल
                            </div>
                            <div class="bg-white text-black rounded-lg p-2 border-2 border-black">
                                <b>जेंडर:</b> ${gender}
                            </div>
                        `;
                        // Change color based on gender for fun
                        resultBox.style.backgroundColor = detections.gender === 'male' ? '#38bdf8' : '#f472b6';
                        resultBox.style.display = 'block';
                    } else {
                        // Fail! No face found
                        resultBox.innerHTML = `❌ चेहरा साफ नहीं दिखा!<br><span class="text-sm">कैमरे के बिल्कुल सामने देखो मेरे दोस्त!</span>`;
                        resultBox.style.backgroundColor = '#ff4d4d';
                        resultBox.style.display = 'block';
                    }
                } catch (error) {
                    console.error("Scan Error:", error);
                    vidContainer.classList.remove('scanning');
                    scanBtn.disabled = false;
                    scanBtn.innerText = "📸 दुबारा कोशिश करो";
                    alert("स्कैन करते समय कुछ दिक्कत आ गई! फिर से ट्राई करो।");
                }
            }, 1500); // 1.5 seconds animation delay
        });
    </script>
</body>
</html>
