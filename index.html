<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon AI Face Scanner</title>
    <!-- Google Fonts for Cartoon Look -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Face API (The Brain of our Scanner) -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        /* Cartoon Style 2026 (Neobrutalism) */
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #ffde59;
            background-image: radial-gradient(#ffbd00 20%, transparent 20%), radial-gradient(#ffbd00 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .cartoon-card {
            background-color: white;
            border: 6px solid black;
            border-radius: 30px;
            box-shadow: 10px 10px 0px black;
            padding: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 350px;
            border: 5px solid black;
            border-radius: 20px;
            overflow: hidden;
            background-color: #ffe4e1;
            box-shadow: inset 0px 0px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        /* Scanning Animation */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #00ffcc;
            box-shadow: 0px 0px 15px 5px rgba(0, 255, 204, 0.7);
            display: none;
            z-index: 10;
        }

        .scanning .scan-line {
            display: block;
            animation: scanAnim 1.5s linear infinite alternate;
        }

        @keyframes scanAnim {
            0% { top: 0%; }
            100% { top: 98%; }
        }

        /* Cartoon Button */
        .cartoon-btn {
            background-color: #ff5757;
            color: white;
            border: 4px solid black;
            border-radius: 15px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 5px 5px 0px black;
            transition: all 0.1s ease-in-out;
            width: 100%;
            text-transform: uppercase;
        }

        .cartoon-btn:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px black;
        }

        .cartoon-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: 5px 5px 0px black;
        }

        /* Result Box */
        .result-box {
            display: none;
            background-color: #cb6ce6;
            color: white;
            border: 4px solid black;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            box-shadow: 5px 5px 0px black;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Loading Overlay */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            z-index: 50;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 6px solid #ffde59;
            border-top: 6px solid #ff5757;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="cartoon-card">
        <!-- Loading Screen for AI Models -->
        <div id="loading-overlay">
            <div class="spinner"></div>
            <p id="loading-text">AI Models Load Ho Rahe Hain... ⏳<br><span class="text-sm text-gray-500">Wait Karo Dost...</span></p>
        </div>

        <h1 class="text-3xl font-bold mb-4 text-black tracking-wide" style="text-shadow: 2px 2px 0px white;">🤖 AI Face Scanner</h1>
        
        <div class="video-container" id="vid-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="scan-line"></div>
        </div>

        <button id="scan-btn" class="cartoon-btn" disabled>📸 Click & Scan</button>

        <div id="result" class="result-box">
            <!-- Results will show here -->
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const scanBtn = document.getElementById('scan-btn');
        const resultBox = document.getElementById('result');
        const loadingOverlay = document.getElementById('loading-overlay');
        const vidContainer = document.getElementById('vid-container');
        const loadingText = document.getElementById('loading-text');

        // Step 1: Load AI Models
        async function loadModels() {
            try {
                const modelUrl = 'https://justadudewhohacks.github.io/face-api.js/models';
                
                // Loading tiny face detector & age/gender network
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl),
                    faceapi.nets.ageGenderNet.loadFromUri(modelUrl)
                ]);

                loadingText.innerHTML = "Camera Start Ho Raha Hai... 🎥";
                startVideo();
            } catch (error) {
                console.error(error);
                loadingText.innerHTML = "❌ Internet Issue! Models Load Nahi Hue.";
            }
        }

        // Step 2: Start Camera
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } // Front camera
            })
            .then(stream => {
                video.srcObject = stream;
                // Wait for video to be ready before removing loading screen
                video.onloadedmetadata = () => {
                    loadingOverlay.style.display = 'none';
                    scanBtn.disabled = false;
                };
            })
            .catch(err => {
                console.error(err);
                loadingText.innerHTML = "❌ Camera Permission Denied!<br>Allow Karo Please.";
            });
        }

        // Step 3: Scan on Button Click
        scanBtn.addEventListener('click', async () => {
            // Reset UI
            resultBox.style.display = 'none';
            vidContainer.classList.add('scanning');
            scanBtn.innerText = "⏳ Scanning...";
            scanBtn.disabled = true;

            // Wait a little bit for the cool scanning animation effect
            setTimeout(async () => {
                try {
                    // Detect Face, Age, and Gender
                    const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withAgeAndGender();
                    
                    vidContainer.classList.remove('scanning');
                    scanBtn.innerText = "📸 Scan Again";
                    scanBtn.disabled = false;

                    if (detections) {
                        // Success! Show Results
                        const age = Math.round(detections.age);
                        const gender = detections.gender === 'male' ? 'Ladka 👦' : 'Ladki 👧';
                        
                        // Adding some fun to the exact age
                        resultBox.innerHTML = `
                            <div class="text-xl mb-2">✨ Face Detected! ✨</div>
                            <div class="bg-white text-black rounded-lg p-2 mb-2 border-2 border-black">
                                <b>Umar (Age):</b> ${age} Saal
                            </div>
                            <div class="bg-white text-black rounded-lg p-2 border-2 border-black">
                                <b>Gender:</b> ${gender}
                            </div>
                        `;
                        resultBox.style.backgroundColor = detections.gender === 'male' ? '#38bdf8' : '#f472b6';
                        resultBox.style.display = 'block';
                    } else {
                        // Fail! No face found
                        resultBox.innerHTML = `❌ Face Nahi Mila!<br><span class="text-sm">Sahi se camera me dekho!</span>`;
                        resultBox.style.backgroundColor = '#ff4d4d';
                        resultBox.style.display = 'block';
                    }
                } catch (error) {
                    vidContainer.classList.remove('scanning');
                    scanBtn.disabled = false;
                    scanBtn.innerText = "📸 Try Again";
                    alert("Kuch error aagaya scan karte time!");
                }
            }, 1500); // 1.5 seconds animation delay for feel
        });

        // Initialize App
        window.onload = loadModels;
    </script>
</body>
</html>
